<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>すいせんのラッパ 授業用</title>
<style>
  :root{
    --bg:#f6f1e7;
    --paper:#fffdf8;
    --ink:#222;
    --sub:#666;
    --border:#e4dccf;
    --subject-bg:#ffe2dd;
    --subject-text:#b8322a;
    --predicate-bg:#ddeaff;
    --predicate-text:#1f56b8;
    --btn:#fff;
    --btn-active:#dff3e3;
    --btn-border:#b9d7bf;
    --active-col:#fff4c8;
    --active-border:#e2c96c;
    --card-bg:#faf6ef;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg);
    color:var(--ink);
    font-family:"Hiragino Mincho ProN","Yu Mincho","BIZ UDPMincho","MS Mincho",serif;
  }

  body{
    display:flex;
    flex-direction:column;
  }

  .top{
    flex:0 0 auto;
    background:rgba(255,253,248,.98);
    border-bottom:1px solid var(--border);
    padding:10px 12px 8px;
    text-align:center;
  }

  .title{
    font-size:18px;
    font-weight:700;
    margin-bottom:8px;
    letter-spacing:.04em;
  }

  .controls{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .btn{
    min-width:108px;
    height:46px;
    border:none;
    border-radius:14px;
    background:var(--btn);
    box-shadow:0 2px 8px rgba(0,0,0,.12);
    font-size:16px;
    font-family:inherit;
    font-weight:700;
    cursor:pointer;
  }

  .btn.active{
    background:var(--btn-active);
    border:1px solid var(--btn-border);
  }

  .legend{
    margin-top:8px;
    display:flex;
    justify-content:center;
    gap:10px;
    font-size:12px;
    flex-wrap:wrap;
  }

  .chip{
    padding:4px 10px;
    border-radius:999px;
    font-weight:700;
  }

  .chip.subject{
    background:var(--subject-bg);
    color:var(--subject-text);
  }

  .chip.predicate{
    background:var(--predicate-bg);
    color:var(--predicate-text);
  }

  .main{
    flex:1 1 auto;
    min-height:0;
    padding:10px;
    display:grid;
    grid-template-rows:2.2fr 1fr;
    gap:10px;
  }

  .panel{
    background:var(--paper);
    border:1px solid var(--border);
    border-radius:22px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    min-height:0;
  }

  .reading-panel{
    overflow:hidden;
    padding:10px 8px;
  }

  .columns{
    height:100%;
    display:flex;
    flex-direction:row-reverse;
    gap:4px;
    align-items:stretch;
    justify-content:flex-start;
    overflow:hidden;
  }

  .col{
    flex:1 1 0;
    min-width:0;
    border:1px solid #eee2d4;
    background:#fffdfa;
    border-radius:14px;
    padding:8px 2px;
    cursor:pointer;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    transition:.15s;
    overflow:hidden;
  }

  .col.active{
    background:var(--active-col);
    border:2px solid var(--active-border);
  }

  .sentence-wrap{
    width:100%;
    height:100%;
    display:flex;
    align-items:flex-start;
    justify-content:flex-start;
    overflow:hidden;
  }

  .sentence{
    writing-mode:vertical-rl;
    text-orientation:mixed;
    white-space:nowrap;
    font-size:clamp(9px,0.9vw,14px);
    line-height:1.42;
    letter-spacing:0;
    height:100%;
  }

  ruby{ ruby-position:over; }

  rt{
    font-size:34%;
    color:var(--sub);
  }

  .subject-mark{
    background:var(--subject-bg);
    color:var(--subject-text);
    border-radius:6px;
    padding:1px 2px;
    font-weight:700;
  }

  .predicate-mark{
    background:var(--predicate-bg);
    color:var(--predicate-text);
    border-radius:6px;
    padding:1px 2px;
    font-weight:700;
  }

  .support-panel{
    display:grid;
    grid-template-columns:1.25fr 1fr;
    overflow:hidden;
  }

  .support-left{
    border-right:1px solid var(--border);
    padding:16px 18px;
    display:flex;
    align-items:flex-start;
    justify-content:flex-start;
    min-width:0;
    background:#fffefb;
  }

  .support-text{
    font-size:28px;
    line-height:1.8;
    word-break:break-word;
    text-align:left;
    width:100%;
  }

  .support-right{
    padding:12px;
    display:grid;
    grid-template-columns:repeat(2, minmax(0,1fr));
    gap:10px;
    align-content:center;
  }

  .vocab-card{
    background:var(--card-bg);
    border:1px solid #eadfce;
    border-radius:16px;
    padding:10px 8px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:8px;
    min-height:100px;
    height:100px;
    cursor:pointer;
    text-align:center;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    box-shadow:0 1px 4px rgba(0,0,0,.04);
  }

  .vocab-card:active{
    transform:scale(.98);
    background:#fff2a8;
  }

  .vocab-emoji{
    font-size:24px;
    line-height:1;
    height:24px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .vocab-emoji.empty{
    visibility:hidden;
  }

  .vocab-jp{
    font-size:16px;
    font-weight:700;
    line-height:1.4;
    text-align:center;
  }

  @media (max-width:1100px){
    .sentence{font-size:clamp(8px,0.85vw,12px);}
    .support-text{font-size:24px;}
    .vocab-card{min-height:90px;height:90px;}
    .vocab-jp{font-size:14px;}
  }

  @media (max-width:820px){
    .top{padding:8px 8px 6px;}
    .title{font-size:16px;}
    .btn{min-width:90px;height:40px;font-size:14px;}
    .main{padding:6px;gap:6px;}
    .reading-panel{padding:6px 4px;}
    .columns{gap:3px;}
    .col{padding:4px 1px;}
    .sentence{font-size:clamp(7px,0.78vw,10px); line-height:1.36;}
    .support-panel{grid-template-columns:1.15fr 1fr;}
    .support-left{padding:10px 10px;}
    .support-text{font-size:18px;}
    .support-right{padding:8px;gap:8px;}
    .vocab-card{min-height:74px;height:74px;padding:6px 4px;}
    .vocab-emoji{font-size:18px;height:18px;}
    .vocab-jp{font-size:12px;}
  }
</style>
</head>
<body>

  <div class="title">すいせんのラッパ</div>

</div>

      {jpHtml:`「かえるの おすもうさんだ」`, jaSpeak:"かえる の おすもうさん だ", emoji:"🤼", pt:"parece lutador de sumô", tl:"parang manlalaro ng sumo"},
      {jpHtml:`いいました`, jaSpeak:"いいました", emoji:"", pt:"disseram", tl:"sinabi"}
    ]
  },
  {
    sentenceSpeak:"ありたちは かえるの よこづなだ と いいました。",
    sentenceHtml:`<span class="subject-mark">ありたちは</span> 「かえるの よこづなだ」と <span class="predicate-mark">いいました</span>。`,
    supportHtml:`ありたちは 「かえるの よこづなだ」と いいました。`,
    vocab:[
      {jpHtml:`「かえるの よこづなだ」`, jaSpeak:"かえる の よこづな だ", emoji:"🏅", pt:"é o campeão do sumô", tl:"siya ang kampeon sa sumo"},
      {jpHtml:`いいました`, jaSpeak:"いいました", emoji:"", pt:"disseram", tl:"sinabi"}
    ]
  },
  {
    sentenceSpeak:"ありたちは はっぱの うえで はねて てを たたきました。",
    sentenceHtml:`<span class="subject-mark">ありたちは</span> <ruby>葉<rt>は</rt></ruby>っぱの <ruby>上<rt>うえ</rt></ruby>で はねて <span class="predicate-mark"><ruby>手<rt>て</rt></ruby>を たたきました</span>。`,
    supportHtml:`ありたちは <ruby>葉<rt>は</rt></ruby>っぱの <ruby>上<rt>うえ</rt></ruby>で はねて <ruby>手<rt>て</rt></ruby>を たたきました。`,
    vocab:[
      {jpHtml:`<ruby>手<rt>て</rt></ruby>を`, jaSpeak:"て を", emoji:"👏", pt:"as mãos", tl:"ang kamay"},
      {jpHtml:`たたきました`, jaSpeak:"たたきました", emoji:"", pt:"bateram palmas", tl:"pumalakpak"}
    ]
  }
];

function stopSpeech(){
  speechSynthesis.cancel();
}

function getVoices(){
  return speechSynthesis.getVoices() || [];
}

function warmUpVoices(){
  getVoices();
  setTimeout(() => getVoices(), 150);
  setTimeout(() => getVoices(), 500);
}

function normalizeTextForSpeech(text, lang){
  if(!text) return "";
  let t = text;

  t = t.replace(/・/g, "、");
  t = t.replace(/･･･+/g, "。");
  t = t.replace(/…+/g, "。");
  t = t.replace(/[()（）]/g, "");
  t = t.replace(/\s+/g, " ").trim();

  if(lang === "ja-JP"){
    t = t.replace(/プップ/g, "プッ プ");
    t = t.replace(/パッパラピー/g, "パッ パラ ピー");
    t = t.replace(/パッパ/g, "パッ パ");
    t = t.replace(/ブウー/g, "ブー ウー");
    t = t.replace(/どっすん/g, "どっ すん");
    t = t.replace(/ぼこ/g, "ぼ こ");
    t = t.replace(/パオーン/g, "パ オーン");
  }

  if(lang === "pt-BR" || lang === "fil-PH" || lang === "tl-PH"){
    t = t.replace(/-/g, " ");
  }

  return t;
}

function pickVoiceByPriority(candidates){
  const voices = getVoices();
  for(const test of candidates){
    const found = voices.find(test);
    if(found) return found;
  }
  return null;
}

function findJapaneseVoice(){
  return pickVoiceByPriority([
    v => /^ja[-_]?JP$/i.test(v.lang) && /Google/i.test(v.name),
    v => /^ja[-_]?JP$/i.test(v.lang),
    v => /^ja/i.test(v.lang)
  ]);
}

function findPortugueseVoice(){
  return pickVoiceByPriority([
    v => /^pt[-_]?BR$/i.test(v.lang) && /Google/i.test(v.name),
    v => /^pt[-_]?BR$/i.test(v.lang),
    v => /^pt/i.test(v.lang)
  ]);
}

function findTagalogVoice(){
  return pickVoiceByPriority([
    v => /^fil[-_]?PH$/i.test(v.lang) && /Google/i.test(v.name),
    v => /^tl[-_]?PH$/i.test(v.lang) && /Google/i.test(v.name),
    v => /^fil[-_]?PH$/i.test(v.lang),
    v => /^tl[-_]?PH$/i.test(v.lang),
    v => /^fil$/i.test(v.lang),
    v => /^tl$/i.test(v.lang),
    v => /Filipino|Tagalog/i.test(v.name),
    v => /^en[-_]?PH$/i.test(v.lang)
  ]);
}

function makeUtterance(text, lang, forcedVoice = null){
  const u = new SpeechSynthesisUtterance(normalizeTextForSpeech(text, lang));
  u.lang = lang;
  u.pitch = 1.0;
  u.volume = 1.0;

  if(lang === "ja-JP"){
    u.rate = 0.48;
    u.voice = forcedVoice || findJapaneseVoice() || null;
  }else if(lang === "pt-BR"){
    u.rate = 0.46;
    u.voice = forcedVoice || findPortugueseVoice() || null;
  }else if(lang === "fil-PH" || lang === "tl-PH"){
    u.rate = 0.45;
    u.voice = forcedVoice || findTagalogVoice() || null;
  }else{
    u.rate = 0.48;
    if(forcedVoice) u.voice = forcedVoice;
  }

  return u;
}

function speakWithDelay(utterance, delay = 120){
  setTimeout(() => {
    speechSynthesis.speak(utterance);
  }, delay);
}

function speakJP(text){
  stopSpeech();
  const u = makeUtterance(text, "ja-JP");
  speakWithDelay(u, 120);
}

function getTagalogLangFromVoice(voice){
  if(!voice || !voice.lang) return "fil-PH";
  if(/^tl/i.test(voice.lang)) return "tl-PH";
  if(/^fil/i.test(voice.lang)) return "fil-PH";
  if(/^en[-_]?PH$/i.test(voice.lang)) return voice.lang;
  return "fil-PH";
}

function speakWordThenTranslation(jaText, ptText, tlText){
  stopSpeech();

  const jp = makeUtterance(jaText, "ja-JP");

  if(currentLang === "pt"){
    const ptVoice = findPortugueseVoice();
    if(!ptVoice){
      speakWithDelay(jp, 120);
      setTimeout(() => {
        alert("この端末にポルトガル語の音声が入っていないため、日本語だけ再生しました。");
      }, 500);
      return;
    }

    const pt = makeUtterance(ptText, "pt-BR", ptVoice);
    jp.onend = () => speakWithDelay(pt, 260);
    speakWithDelay(jp, 120);
    return;
  }

  const tlVoice = findTagalogVoice();
  if(!tlVoice){
    speakWithDelay(jp, 120);
    setTimeout(() => {
      alert("この端末にはタガログ語の音声が入っていません。タガログ語は文字で見せてください。");
    }, 500);
    return;
  }

  const tlLang = getTagalogLangFromVoice(tlVoice);
  const tl = makeUtterance(tlText, tlLang, tlVoice);

  jp.onend = () => speakWithDelay(tl, 260);
  speakWithDelay(jp, 120);
}

function toggleLanguage(){
  currentLang = currentLang === "pt" ? "tl" : "pt";
  document.getElementById("langBtn").textContent =
    currentLang === "pt" ? "ポルトガル語" : "タガログ語";
  stopSpeech();
}

function renderColumns(){
  const columns = document.getElementById("columns");
  columns.innerHTML = "";

  lessonData.forEach((item, index) => {
    const col = document.createElement("div");
    col.className = "col" + (selectedIndex === index ? " active" : "");
    col.onclick = () => {
      selectedIndex = index;
      renderColumns();
      renderSupport();
    };

    const sentenceWrap = document.createElement("div");
    sentenceWrap.className = "sentence-wrap";

    const sentence = document.createElement("div");
    sentence.className = "sentence";
    sentence.innerHTML = item.sentenceHtml;

    sentenceWrap.appendChild(sentence);
    col.appendChild(sentenceWrap);
    columns.appendChild(col);
  });
}

function renderSupport(){
  const area = document.getElementById("selectedSentence");
  const vocabArea = document.getElementById("vocabArea");
  const item = lessonData[selectedIndex];

  area.innerHTML = item.supportHtml;
  vocabArea.innerHTML = "";

  item.vocab.forEach(word => {
    const card = document.createElement("div");
    card.className = "vocab-card";
    card.onclick = () => {
      speakWordThenTranslation(word.jaSpeak, word.pt, word.tl);
    };
    card.innerHTML = `
      <div class="vocab-emoji ${word.emoji ? '' : 'empty'}">${word.emoji || '○'}</div>
      <div class="vocab-jp">${word.jpHtml}</div>
    `;
    vocabArea.appendChild(card);
  });
}

function initVoicesAndRender(){
  warmUpVoices();
  renderColumns();
  renderSupport();
}

window.addEventListener("load", () => {
  initVoicesAndRender();
  setTimeout(() => {
    voicesReady = true;
    renderColumns();
    renderSupport();
  }, 700);
});

speechSynthesis.onvoiceschanged = () => {
  voicesReady = true;
  renderColumns();
  renderSupport();
};
</script>
