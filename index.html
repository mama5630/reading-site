<html lang="ja">
<head>
<meta charset="UTF-8">

<title>すいせんのラッパ 授業用</title>
<style>
:root{
  --bg:#f6f1e7;
  --paper:#fffdf8;
  --ink:#222;
  --sub:#999;
  --border:#e4dccf;
  --btn:#fff;
  --btn-active:#dff3e3;
  --btn-border:#b9d7bf;
  --active-col:#fff9e0;
  --active-border:#e2c96c;
  --card-bg:#faf6ef;
  --ruby-color:#b06000;
  --shu-bg:#d8d8d8;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--ink);
  font-family:"Hiragino Mincho ProN","Yu Mincho","BIZ UDPMincho","MS Mincho",serif;
  display:flex;flex-direction:column;
}
.top{flex:0 0 auto;background:rgba(255,253,248,.98);border-bottom:1px solid var(--border);padding:6px 10px 4px;text-align:center;}
.title{font-size:15px;font-weight:700;margin-bottom:4px;letter-spacing:.04em;}
.controls{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{min-width:86px;height:34px;border:none;border-radius:11px;background:var(--btn);box-shadow:0 2px 7px rgba(0,0,0,.11);font-size:13px;font-family:inherit;font-weight:700;cursor:pointer;transition:.12s;}
.btn:active{transform:scale(.97);}
.btn.active{background:var(--btn-active);border:1px solid var(--btn-border);}
.legend{margin-top:4px;display:flex;justify-content:center;gap:10px;font-size:11px;flex-wrap:wrap;align-items:center;}
.chip-shu{background:var(--shu-bg);border-radius:3px;padding:1px 7px;font-weight:700;}
.chip-jutsu{font-weight:900;padding:1px 4px;}
.mp3-hint{font-size:10px;color:var(--sub);margin-left:2px;}
.main{flex:1 1 auto;min-height:0;padding:6px;display:grid;grid-template-rows:2.2fr 1fr;gap:6px;}
.panel{background:var(--paper);border:1px solid var(--border);border-radius:18px;box-shadow:0 2px 9px rgba(0,0,0,.07);min-height:0;}
.reading-panel{overflow:hidden;padding:6px 4px;}
.columns{height:100%;display:flex;flex-direction:row-reverse;gap:2px;align-items:stretch;overflow-x:auto;overflow-y:hidden;}
.col{flex:0 0 auto;min-width:28px;border:1px solid #eee2d4;background:#fffdfa;border-radius:11px;padding:6px 2px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:.13s;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;position:relative;}
.col.active{background:var(--active-col);border:2px solid var(--active-border);}
.col.has-audio::after{content:'♪';position:absolute;bottom:3px;right:2px;font-size:8px;color:#7ab87a;}
.sentence{writing-mode:vertical-rl;text-orientation:mixed;white-space:pre;font-size:clamp(7px, 0.85vw, 11px);line-height:2.6;height:100%;}
.sentence ruby{ruby-position:inter-character;}
@supports not (ruby-position:inter-character){.sentence ruby{ruby-position:over;}}
.sentence rt{font-size:55%;color:var(--ruby-color);font-family:"Hiragino Sans","Yu Gothic",sans-serif;}
.shu{background:var(--shu-bg);border-radius:2px;padding:0 1px;}
.jutsu{font-weight:900;}
.support-panel{display:grid;grid-template-columns:1.3fr 1fr;overflow:hidden;border-radius:18px;}
.support-left{border-right:1px solid var(--border);padding:8px 12px;display:flex;flex-direction:column;justify-content:center;min-width:0;background:#fffefb;border-radius:18px 0 0 18px;overflow:hidden;}
.support-sentence{font-size:clamp(13px,1.6vw,21px);line-height:2.5;white-space:pre-wrap;width:100%;}
.support-sentence ruby{ruby-position:over;}
.support-sentence rt{font-size:52%;color:var(--ruby-color);font-family:"Hiragino Sans","Yu Gothic",sans-serif;}
.support-sentence .shu{background:var(--shu-bg);border-radius:2px;padding:0 2px;}
.support-sentence .jutsu{font-weight:900;}
.mp3-row{margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.mp3-label{font-size:10px;color:var(--sub);font-family:"Hiragino Sans","Yu Gothic",sans-serif;}
.mp3-status{font-size:10px;color:#3a6e3a;font-family:"Hiragino Sans","Yu Gothic",sans-serif;}
.support-right{padding:6px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;align-content:center;border-radius:0 18px 18px 0;}
.vocab-card{background:var(--card-bg);border:1px solid #e8ddc8;border-radius:12px;padding:6px 4px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;height:clamp(72px,9vh,108px);cursor:pointer;text-align:center;user-select:none;-webkit-tap-highlight-color:transparent;transition:.13s;}
.vocab-card:active{transform:scale(.97);background:#fff2a8;}
.vocab-card.playing{border-color:#a8d4a8;background:#f0faf0;}
.vocab-emoji{font-size:clamp(14px,1.8vw,22px);line-height:1;display:flex;align-items:center;justify-content:center;}
.vocab-jp{font-size:clamp(10px,1vw,13px);font-weight:700;line-height:1.3;}
.vocab-jp ruby{ruby-position:over;}
.vocab-jp rt{font-size:55%;color:var(--ruby-color);font-family:"Hiragino Sans","Yu Gothic",sans-serif;}
.vocab-trans{font-size:clamp(8px,0.8vw,11px);color:#444;line-height:1.2;font-family:"Hiragino Sans","Yu Gothic",sans-serif;font-weight:600;}
.vocab-kana{font-size:clamp(7px,0.7vw,10px);color:var(--sub);line-height:1.2;font-family:"Hiragino Sans","Yu Gothic",sans-serif;}
@media(max-width:820px){.support-panel{grid-template-columns:1.1fr 1fr;}.support-left{padding:6px 8px;}.support-right{padding:4px;gap:4px;}.vocab-card{height:68px;}}
</style>
</head>

function zeroPad(n){ return String(n).padStart(2,'0'); }
function audioPath(i){ return `audio_${zeroPad(i)}.mp3`; }
function checkAllAudio(){
  for(let i=0;i<TOTAL;i++){
    (function(idx){
      const a=new Audio();
      a.src=audioPath(idx);
      a.addEventListener('canplaythrough',()=>{mp3Store[idx]=true;const cols=document.querySelectorAll('.col');if(cols[idx])cols[idx].classList.add('has-audio');if(idx===selectedIndex)buildMp3Row();},{once:true});
      a.addEventListener('error',()=>{mp3Store[idx]=false;},{once:true});
      a.load();
    })(i);
  }
}

function stopSpeech(){
  if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;currentAudio=null;}
  speechSynthesis.cancel();
}
function findVoice(tests){
  const vv=speechSynthesis.getVoices();
  for(const t of tests){const f=vv.find(t);if(f)return f;}
  return null;
}
function normalizeJa(t){
  return t
    .replace(/・/g,'、')
    .replace(/プップ/g,'プッ プ')
    .replace(/パッパラピー/g,'パッ パラ ピー')
    .replace(/パッパ/g,'パッ パ')
    .replace(/ブウー/g,'ブー ウー')
    .replace(/どっすん/g,'どっ すん')
    .replace(/パオーン/g,'パ オーン');
}
function speakTTS(text,lang,onEnd){
  const u=new SpeechSynthesisUtterance();
  u.lang=lang;u.volume=1;u.pitch=1;
  if(lang==='ja-JP'){
    u.text=normalizeJa(text);u.rate=0.45;
    u.voice=findVoice([v=>/^ja[-_]?JP$/i.test(v.lang)&&/Google/i.test(v.name),v=>/^ja[-_]?JP$/i.test(v.lang),v=>/^ja/i.test(v.lang)]);
  }else if(lang==='pt-BR'){
    u.text=text;u.rate=0.42;
    u.voice=findVoice([v=>/^pt[-_]?BR$/i.test(v.lang)&&/Google/i.test(v.name),v=>/^pt[-_]?BR$/i.test(v.lang),v=>/^pt/i.test(v.lang)]);
  }else{
    u.text=text;u.rate=0.44;
    u.voice=findVoice([v=>/^fil/i.test(v.lang),v=>/Filipino/i.test(v.name),v=>/^tl/i.test(v.lang),v=>/Tagalog/i.test(v.name)]);
  }
  if(onEnd)u.onend=onEnd;
  speechSynthesis.speak(u);
}
function playMP3(path,onEnd){
  stopSpeech();
  const a=new Audio(path);
  currentAudio=a;
  a.onended=()=>{currentAudio=null;if(onEnd)onEnd();};
  a.play().catch(()=>{currentAudio=null;});
}
function playCurrentSentence(){
  stopSpeech();
  const idx=selectedIndex;
  if(mp3Store[idx]===true){playMP3(audioPath(idx));}
  else{speakTTS(lessonData[idx].sentenceSpeak,'ja-JP');}
}
function speakVocab(v,cardEl){
  stopSpeech();
  if(cardEl)cardEl.classList.add('playing');
  const restore=()=>{if(cardEl)cardEl.classList.remove('playing');};
  const foreignLang=currentLang==='pt'?'pt-BR':'fil-PH';
  const foreignText=currentLang==='pt'?v.ptSpeak:v.filSpeak;
  speakTTS(v.jaSpeak,'ja-JP',()=>{
    setTimeout(()=>{speakTTS(foreignText,foreignLang,()=>{setTimeout(restore,200);});},500);
  });
}
function buildColumns(){
  const container=document.getElementById('columns');
  container.innerHTML='';
  lessonData.forEach((d,i)=>{
    const col=document.createElement('div');
    col.className='col'+(i===selectedIndex?' active':'')+(mp3Store[i]?' has-audio':'');
    col.innerHTML=`<div class="sentence">${d.sentenceHtml}</div>`;
    col.addEventListener('click',()=>selectSentence(i));
    container.appendChild(col);
  });
}
function buildMp3Row(){
  const row=document.getElementById('mp3Row');
  const idx=selectedIndex;
  const fname=audioPath(idx);
  if(mp3Store[idx]===true){
    row.innerHTML=`<span class="mp3-status">♪ ${fname} を読み込み中</span>`;
  }else if(mp3Store[idx]===false){
    row.innerHTML=`<span class="mp3-label">${fname} が見つかりません（TTSで読みます）</span>`;
  }else{
    row.innerHTML=`<span class="mp3-label">確認中…（${fname}）</span>`;
  }
}
function buildSupport(){
  const d=lessonData[selectedIndex];
  document.getElementById('selectedSentence').innerHTML=d.supportHtml;
  buildMp3Row();
  const area=document.getElementById('vocabArea');
  area.innerHTML='';
  d.vocab.forEach(v=>{
    const card=document.createElement('div');
    card.className='vocab-card';
    const hasEmoji=v.emoji!=null;
    const transText=currentLang==='pt'?v.pt:v.fil;
    const kanaText=currentLang==='pt'?v.pt_kana:v.fil_kana;
    card.innerHTML=`
      ${hasEmoji?`<div class="vocab-emoji">${v.emoji}</div>`:''}
      <div class="vocab-jp">${v.jpHtml}</div>
      <div class="vocab-trans">${transText}</div>
      <div class="vocab-kana">${kanaText}</div>
    `;
    card.addEventListener('click',()=>speakVocab(v,card));
    area.appendChild(card);
  });
}
function selectSentence(i){
  selectedIndex=i;
  document.querySelectorAll('.col').forEach((c,idx)=>c.classList.toggle('active',idx===i));
  buildSupport();
}
function toggleLanguage(){
  currentLang=currentLang==='pt'?'fil':'pt';
  document.getElementById('langBtn').textContent=currentLang==='pt'?'ポルトガル語':'フィリピノ語';
  buildSupport();
}
speechSynthesis.getVoices();
speechSynthesis.onvoiceschanged=()=>{speechSynthesis.getVoices();};
buildColumns();
buildSupport();
checkAllAudio();
