<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>すいせんのラッパ 授業用</title>
<style>
:root{
  --bg:#f6f1e7;
  --paper:#fffdf8;
  --ink:#222;
  --sub:#999;
  --border:#e4dccf;
  --subject-bg:#ffe2dd;
  --subject-text:#b8322a;
  --predicate-bg:#ddeaff;
  --predicate-text:#1f56b8;
  --btn:#fff;
  --btn-active:#dff3e3;
  --btn-border:#b9d7bf;
  --active-col:#fff9e0;
  --active-border:#e2c96c;
  --card-bg:#faf6ef;
  --ruby-color:#b06000;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:var(--bg);color:var(--ink);
  font-family:"Hiragino Mincho ProN","Yu Mincho","BIZ UDPMincho","MS Mincho",serif;
  display:flex;flex-direction:column;
}

/* ===== TOP ===== */
.top{
  flex:0 0 auto;
  background:rgba(255,253,248,.98);
  border-bottom:1px solid var(--border);
  padding:7px 10px 5px;
  text-align:center;
}
.title{font-size:16px;font-weight:700;margin-bottom:5px;letter-spacing:.04em;}
.controls{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{
  min-width:90px;height:38px;border:none;border-radius:11px;
  background:var(--btn);box-shadow:0 2px 7px rgba(0,0,0,.11);
  font-size:14px;font-family:inherit;font-weight:700;cursor:pointer;
  transition:.12s;
}
.btn:active{transform:scale(.97);}
.btn.active{background:var(--btn-active);border:1px solid var(--btn-border);}
.btn.danger{background:#fff0f0;border:1px solid #f5b8b8;color:#b83232;}
.legend{
  margin-top:5px;display:flex;justify-content:center;gap:7px;
  font-size:11px;flex-wrap:wrap;align-items:center;
}
.chip{padding:2px 9px;border-radius:999px;font-weight:700;}
.chip.subject{background:var(--subject-bg);color:var(--subject-text);}
.chip.predicate{background:var(--predicate-bg);color:var(--predicate-text);}
.mp3-hint{font-size:10px;color:var(--sub);margin-left:4px;}

/* ===== MAIN ===== */
.main{
  flex:1 1 auto;min-height:0;padding:7px;
  display:grid;grid-template-rows:2.3fr 1fr;gap:7px;
}
.panel{
  background:var(--paper);border:1px solid var(--border);
  border-radius:18px;box-shadow:0 2px 9px rgba(0,0,0,.07);min-height:0;
}

/* ===== 縦書き列 ===== */
.reading-panel{overflow:hidden;padding:7px 5px;}
.columns{
  height:100%;display:flex;flex-direction:row-reverse;
  gap:2px;align-items:stretch;overflow:hidden;
}
.col{
  flex:1 1 0;min-width:0;
  border:1px solid #eee2d4;background:#fffdfa;
  border-radius:11px;padding:5px 0;
  cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;
  transition:.13s;overflow:hidden;
  display:flex;align-items:flex-start;justify-content:center;
  position:relative;
}
.col.active{background:var(--active-col);border:2px solid var(--active-border);}
.col.has-audio::after{
  content:'♪';position:absolute;bottom:3px;right:3px;
  font-size:9px;color:#7ab87a;
}

/* ===== 縦書き本文 ===== */
/*
  縦書きで読み仮名を「右」（＝文字の右横）に出すには
  ruby-position: inter-character を使う。
  ただしChromeは"over"が縦書きで右側に出る実装になっており、
  "inter-character"はFirefox向け。
  両ブラウザ対応のため over + right の両方を宣言する。
*/
.sentence{
  writing-mode:vertical-rl;
  text-orientation:mixed;
  white-space:nowrap;
  font-size:clamp(8px, 0.95vw, 13px);
  line-height:2.0;   /* ルビ分の余白を確保 */
  height:100%;
}
.sentence ruby{
  ruby-position: inter-character; /* Firefox */
}
/* Chrome/Safari: overは縦書きで右側に出る */
@supports not (ruby-position: inter-character){
  .sentence ruby{ ruby-position: over; }
}
.sentence rt{
  font-size:52%;
  color:var(--ruby-color);
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
}

.subject-mark{
  background:var(--subject-bg);color:var(--subject-text);
  border-radius:4px;padding:0 1px;font-weight:700;
}
.predicate-mark{
  background:var(--predicate-bg);color:var(--predicate-text);
  border-radius:4px;padding:0 1px;font-weight:700;
}

/* ===== サポートパネル ===== */
.support-panel{
  display:grid;grid-template-columns:1.25fr 1fr;
  overflow:hidden;border-radius:18px;
}
.support-left{
  border-right:1px solid var(--border);
  padding:10px 14px;
  display:flex;flex-direction:column;justify-content:center;
  min-width:0;background:#fffefb;
  border-radius:18px 0 0 18px;overflow:hidden;
}
.support-sentence{
  font-size:clamp(14px,1.8vw,23px);
  line-height:2.2;word-break:break-all;width:100%;
}
/* 横書きルビは上 */
.support-sentence ruby{ruby-position:over;}
.support-sentence rt{font-size:52%;color:var(--ruby-color);font-family:"Hiragino Sans","Yu Gothic",sans-serif;}

.mp3-row{
  margin-top:6px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;
}
.mp3-label{
  font-size:11px;color:var(--sub);
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
}
.mp3-upload-btn{
  font-size:11px;padding:3px 9px;border-radius:8px;
  border:1px solid #c8d8c0;background:#f0f8ee;
  cursor:pointer;font-family:inherit;color:#3a6e3a;
  white-space:nowrap;
}
.mp3-upload-btn:hover{background:#e0f0dc;}
.mp3-del-btn{
  font-size:11px;padding:2px 7px;border-radius:7px;
  border:1px solid #f5b8b8;background:#fff0f0;
  cursor:pointer;color:#b83232;font-family:inherit;
}
.mp3-status{font-size:10px;color:#3a6e3a;font-family:"Hiragino Sans","Yu Gothic",sans-serif;}

/* ===== 語彙カード ===== */
.support-right{
  padding:8px;display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:7px;align-content:center;
  border-radius:0 18px 18px 0;
}
.vocab-card{
  background:var(--card-bg);border:1px solid #e8ddc8;
  border-radius:13px;padding:7px 5px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  gap:3px;
  height:clamp(78px,9.5vh,115px);
  cursor:pointer;text-align:center;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transition:.13s;
}
.vocab-card:active{transform:scale(.97);background:#fff2a8;}
.vocab-card.playing{border-color:#a8d4a8;background:#f0faf0;}

.vocab-emoji{
  font-size:clamp(16px,2vw,26px);
  line-height:1;height:clamp(18px,2.2vw,28px);
  display:flex;align-items:center;justify-content:center;
}

.vocab-jp{
  font-size:clamp(10px,1.1vw,14px);
  font-weight:700;line-height:1.3;
}
.vocab-jp ruby{ruby-position:over;}
.vocab-jp rt{font-size:55%;color:var(--ruby-color);font-family:"Hiragino Sans","Yu Gothic",sans-serif;}

/* 翻訳テキスト */
.vocab-trans{
  font-size:clamp(9px,0.85vw,12px);
  color:#444;line-height:1.25;
  font-family:"Hiragino Sans","Yu Gothic","BIZ UDPGothic",sans-serif;
  font-weight:600;
}
/* カタカナ読み */
.vocab-kana{
  font-size:clamp(8px,0.75vw,10px);
  color:var(--sub);line-height:1.2;
  font-family:"Hiragino Sans","Yu Gothic",sans-serif;
}

@media(max-width:820px){
  .support-panel{grid-template-columns:1.1fr 1fr;}
  .support-left{padding:7px 9px;}
  .support-right{padding:5px;gap:5px;}
  .vocab-card{height:72px;}
}
</style>
</head>

const mp3Store = {}; // { index: true } 存在確認済みフラグ
const TOTAL = 23;

function zeroPad(n){ return String(n).padStart(2,'0'); }
function audioPath(i){ return `audio_${zeroPad(i)}.mp3`; }

function checkAllAudio(){
  for(let i=0;i<TOTAL;i++){
    (function(idx){
      const a = new Audio();
      a.src = audioPath(idx);
      a.addEventListener('canplaythrough', ()=>{
        mp3Store[idx] = true;
        const cols = document.querySelectorAll('.col');
        if(cols[idx]) cols[idx].classList.add('has-audio');
        if(idx===selectedIndex) buildMp3Row();
      },{once:true});
      a.addEventListener('error', ()=>{ mp3Store[idx]=false; },{once:true});
      a.load();
    })(i);
  }
}

// ===== TTS =====
function stopSpeech(){
  if(currentAudio){ currentAudio.pause(); currentAudio.currentTime=0; currentAudio=null; }
  speechSynthesis.cancel();
}

function findVoice(tests){
  const vv = speechSynthesis.getVoices();
  for(const t of tests){ const f=vv.find(t); if(f) return f; }
  return null;
}

function normalizeJa(t){
  return t
    .replace(/・/g,'、')
    .replace(/プップ/g,'プッ プ')
    .replace(/パッパラピー/g,'パッ パラ ピー')
    .replace(/パッパ/g,'パッ パ')
    .replace(/ブウー/g,'ブー ウー')
    .replace(/どっすん/g,'どっ すん')
    .replace(/パオーン/g,'パ オーン');
}

function speakTTS(text, lang, onEnd){
  const u = new SpeechSynthesisUtterance();
  u.lang = lang; u.volume = 1; u.pitch = 1;
  if(lang==='ja-JP'){
    u.text = normalizeJa(text);
    u.rate = 0.45;
    u.voice = findVoice([
      v=>/^ja[-_]?JP$/i.test(v.lang)&&/Google/i.test(v.name),
      v=>/^ja[-_]?JP$/i.test(v.lang),
      v=>/^ja/i.test(v.lang)
    ]);
  } else if(lang==='pt-BR'){
    u.text = text;
    u.rate = 0.42;
    u.voice = findVoice([
      v=>/^pt[-_]?BR$/i.test(v.lang)&&/Google/i.test(v.name),
      v=>/^pt[-_]?BR$/i.test(v.lang),
      v=>/^pt/i.test(v.lang)
    ]);
  } else {
    u.text = text;
    u.rate = 0.44;
    u.voice = findVoice([
      v=>/^fil/i.test(v.lang),
      v=>/Filipino/i.test(v.name),
      v=>/^tl/i.test(v.lang),
      v=>/Tagalog/i.test(v.name)
    ]);
  }
  if(onEnd) u.onend = onEnd;
  speechSynthesis.speak(u);
}

// ===== MP3再生 =====
function playMP3(path, onEnd){
  stopSpeech();
  const a = new Audio(path);
  currentAudio = a;
  a.onended = ()=>{ currentAudio=null; if(onEnd) onEnd(); };
  a.play().catch(()=>{ currentAudio=null; });
}

// ===== 文を読む（MP3優先→TTSフォールバック）=====
function playCurrentSentence(){
  stopSpeech();
  const idx = selectedIndex;
  if(mp3Store[idx]===true){
    playMP3(audioPath(idx));
  } else {
    speakTTS(lessonData[idx].sentenceSpeak, 'ja-JP');
  }
}

// ===== 単語カードタップ：日本語→外国語の順に読む =====
function speakVocab(v, cardEl){
  stopSpeech();
  if(cardEl) cardEl.classList.add('playing');
  const restore = ()=>{ if(cardEl) cardEl.classList.remove('playing'); };

  const foreignLang = currentLang==='pt' ? 'pt-BR' : 'fil-PH';
  const foreignText = currentLang==='pt' ? v.ptSpeak : v.filSpeak;

  // 日本語全部読む → 間 → 外国語
  speakTTS(v.jaSpeak, 'ja-JP', ()=>{
    setTimeout(()=>{
      speakTTS(foreignText, foreignLang, ()=>{
        setTimeout(restore, 200);
      });
    }, 500);
  });
}

// ===== UI構築 =====
function buildColumns(){
  const container = document.getElementById('columns');
  container.innerHTML='';
  lessonData.forEach((d,i)=>{
    const col=document.createElement('div');
    col.className='col'+(i===selectedIndex?' active':'')+(mp3Store[i]?' has-audio':'');
    col.innerHTML=`<div class="sentence">${d.sentenceHtml}</div>`;
    col.addEventListener('click',()=>selectSentence(i));
    container.appendChild(col);
  });
}

function buildMp3Row(){
  const row = document.getElementById('mp3Row');
  const idx = selectedIndex;
  const fname = audioPath(idx);
  if(mp3Store[idx]===true){
    row.innerHTML=`<span class="mp3-status">♪ ${fname} を読み込み中</span>`;
  } else if(mp3Store[idx]===false){
    row.innerHTML=`<span class="mp3-label">${fname} が見つかりません（TTSで読みます）</span>`;
  } else {
    row.innerHTML=`<span class="mp3-label">確認中…（${fname}）</span>`;
  }
}

function buildSupport(){
  const d = lessonData[selectedIndex];
  document.getElementById('selectedSentence').innerHTML = d.supportHtml;
  buildMp3Row();

  const area = document.getElementById('vocabArea');
  area.innerHTML='';
  d.vocab.forEach(v=>{
    const card=document.createElement('div');
    card.className='vocab-card';
    const hasEmoji = v.emoji != null;
    const transText = currentLang==='pt' ? v.pt : v.fil;
    const kanaText  = currentLang==='pt' ? v.pt_kana : v.fil_kana;
    card.innerHTML=`
      ${hasEmoji ? `<div class="vocab-emoji">${v.emoji}</div>` : ''}
      <div class="vocab-jp">${v.jpHtml}</div>
      <div class="vocab-trans">${transText}</div>
      <div class="vocab-kana">${kanaText}</div>
    `;
    card.addEventListener('click',()=>speakVocab(v, card));
    area.appendChild(card);
  });
}

function selectSentence(i){
  selectedIndex=i;
  document.querySelectorAll('.col').forEach((c,idx)=>c.classList.toggle('active',idx===i));
  buildSupport();
}

function toggleLanguage(){
  currentLang = currentLang==='pt' ? 'fil' : 'pt';
  document.getElementById('langBtn').textContent =
    currentLang==='pt' ? 'ポルトガル語' : 'フィリピノ語';
  buildSupport();
}

// ===== 初期化 =====
speechSynthesis.getVoices();
speechSynthesis.onvoiceschanged = ()=>{ speechSynthesis.getVoices(); };
buildColumns();
buildSupport();
checkAllAudio();
